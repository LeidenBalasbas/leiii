<!DOCTYPE html>
<html>
<head>
    <title>Science Quiz</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #e9ede7;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            width: 400px;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        h1 {
            margin-bottom: 10px;
        }

        input {
            padding: 10px;
            width: 80%;
            margin: 15px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px 20px;
            background-color: #6c7a6b;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background-color: #5a6759;
        }

        .score {
            font-weight: bold;
            margin-bottom: 15px;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>

<div class="container" id="startPage">
    <h1>Welcome</h1>
    <p>Test your basic science knowledge!</p>
    <input type="text" id="username" placeholder="Enter your name">
    <br>
    <button onclick="startQuiz()">Start Quiz »</button>
</div>

<div class="container hidden" id="quizPage">
    <div class="score" id="scoreDisplay">0/10</div>
    <h2 id="questionText"></h2>
    <input type="text" id="answerInput" placeholder="Type your answer">
    <br>
    <button onclick="submitAnswer()">Submit</button>
</div>

<div class="container hidden" id="resultPage">
    <h1 id="finalMessage"></h1>
    <p id="finalScore"></p>
</div>

<script>
    const questions = [
        {q: "What planet is known as the Red Planet?", a: "mars"},
        {q: "What gas do plants use for photosynthesis?", a: "carbon dioxide"},
        {q: "What is the boiling point of water in Celsius?", a: "100"},
        {q: "What force pulls objects toward Earth?", a: "gravity"},
        {q: "What part of the cell contains DNA?", a: "nucleus"},
        {q: "What is H2O commonly known as?", a: "water"},
        {q: "What is the center of our solar system?", a: "sun"},
        {q: "What organ pumps blood in the body?", a: "heart"},
        {q: "What state of matter is air?", a: "gas"},
        {q: "What vitamin do we get from sunlight?", a: "vitamin d"}
    ];

    let currentQuestion = 0;
    let score = 0;
    let userName = "";

    function startQuiz() {
        userName = document.getElementById("username").value;
        if(userName === "") {
            alert("Please enter your name.");
            return;
        }

        document.getElementById("startPage").classList.add("hidden");
        document.getElementById("quizPage").classList.remove("hidden");

        loadQuestion();
    }

    function loadQuestion() {
        document.getElementById("questionText").innerText = 
            questions[currentQuestion].q;
        document.getElementById("answerInput").value = "";
        document.getElementById("scoreDisplay").innerText = score + "/10";
    }

    function submitAnswer() {
        let userAnswer = document.getElementById("answerInput").value.toLowerCase().trim();

        if(userAnswer === questions[currentQuestion].a) {
            score++;
        }

        currentQuestion++;

        if(currentQuestion < questions.length) {
            loadQuestion();
        } else {
            showResults();
        }
    }

    function showResults() {
        document.getElementById("quizPage").classList.add("hidden");
        document.getElementById("resultPage").classList.remove("hidden");

        let message = "";

        if(score >= 8) {
            message = "Congratulations, " + userName + "!";
        } else if(score >= 6) {
            message = "Well Done, " + userName + "!";
        } else if(score >= 3) {
            message = "Not Bad, " + userName + "!";
        } else {
            message = "Try Harder Next Time, " + userName + "!";
        }

        document.getElementById("finalMessage").innerText = message;
        document.getElementById("finalScore").innerText = "Your total score is " + score + "/10";
    }
</script>

</body>
</html>
